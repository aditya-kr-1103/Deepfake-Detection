services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      DEEPFAKE_CORS_ORIGINS: "http://localhost:5173,http://127.0.0.1:5173"
      DEEPFAKE_MODEL_PATH: "/app/backend/weights/dfdc_effnet_b7.pt"
      DEEPFAKE_MAX_UPLOAD_SIZE_MB: "250"
    volumes:
      - ./backend/weights:/app/backend/weights

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: "http://localhost:8000"
    ports:
      - "5173:80"
    depends_on:
      - backend
